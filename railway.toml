[build]
builder = "NIXPACKS"

[deploy]
preDeployCommand = ["python manage.py migrate --settings=config.settings.production && python manage.py collectstatic --noinput --settings=config.settings.production"]
startCommand = "PLAYWRIGHT_BROWSERS_PATH=/app/.cache/ms-playwright gunicorn config.wsgi --log-file -"
healthcheckPath = "/accounts/login/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
